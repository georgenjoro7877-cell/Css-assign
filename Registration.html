<!DOCTYPE html>
<html>
    <head>
        <title>Student Registration</title>
    </head>
    <body style="background-color: lightgrey;font-family: Ariel;">

        <h1 style="text-align: center;color: aquamarine;">Student Registration
        </h1>

        <form style="width: 50%;margin: auto;background: white;padding: 20px;border-radius: 10px;">

            <label>Name:</label><br>
            <input type="text" style="width: 100%;padding: 5px;"><br><br>

            <label>Email:</label><br>
            <input type="email" style="width: 100%;padding: 5px;"><br><br>

            <label>Course:</label><br>
            <input type="text" style="width: 100%;padding: 5px;"><br><br>

            <input type="submit" value="Register" style="background-color: lightblue; color: white;padding: 8px;border: none;width: 100%;">
        </form>
        
    </body>
</html>
